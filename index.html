<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Oximar Sistema</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #eef2f7;
}

/* HEADER */
header {
  background: #2e7d32;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

/* LOGIN */
#loginBox {
  width: 90%;
  max-width: 350px;
  margin: 80px auto;
  background: white;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

/* PAINEL */
#painel {
  display: none;
  padding: 15px;
}

/* INPUTS */
input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  background: #2e7d32;
  color: white;
  border: none;
  font-weight: bold;
}

/* DASHBOARD */
.dashboard {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
  flex-wrap: wrap;
}

.card {
  flex: 1;
  min-width: 120px;
  background: white;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.03);
}

.card h3 {
  margin: 0;
  font-size: 22px;
}

.card p {
  margin: 5px 0 0;
  color: gray;
}

.red {
  border-left: 5px solid red;
}

.yellow {
  border-left: 5px solid orange;
}

/* BUSCA */
#buscar {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
  margin-top: 10px;
}

/* ITEM CLIENTES */
.item {
  background: white;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.vencido {
  border-left: 6px solid red;
  background: #ffe5e5;
}

.atraso {
  font-size: 12px;
  margin-top: 4px;
  color: #b30000;
  font-weight: bold;
}

/* PRODUTOS */
.grid-produtos {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  margin-top: 20px;
}

.produto-card {
  background: white;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 3px 10px rgba(0,0,0,0.15);
  cursor: pointer;
  transition: 0.2s;
}

.produto-card:hover {
  transform: scale(1.05);
}

.produto-card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.label {
  background: #7cb342;
  color: white;
  text-align: center;
  padding: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<header>📦 Oximar Sistema</header>

<!-- LOGIN -->
<div id="loginBox">
  <h3>Login Funcionário</h3>
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="entrar()">Entrar</button>
</div>

<!-- PAINEL -->
<div id="painel">

<!-- DASHBOARD -->
<div class="dashboard">

  <div class="card" onclick="mostrarFiltro('todos')">
    <h3 id="totalClientes">0</h3>
    <p>Total Clientes</p>
  </div>

  <div class="card red" onclick="mostrarFiltro('vencidos')">
    <h3 id="vencidos">0</h3>
    <p>Vencidos</p>
  </div>

  <div class="card yellow" onclick="mostrarFiltro('hoje')">
    <h3 id="hoje">0</h3>
    <p>Vencem Hoje</p>
  </div>

</div>

<!-- PRODUTOS -->
<h2>📦 Produtos</h2>

<div class="grid-produtos">

  <div class="produto-card" onclick="selecionarCategoria('gases')">
    <img src="https://via.placeholder.com/300x200?text=Gases+Industriais">
    <div class="label">Gases Industriais</div>
  </div>

  <div class="produto-card" onclick="selecionarCategoria('oxigenio')">
    <img src="https://via.placeholder.com/300x200?text=Oxigenio">
    <div class="label">Oxigênio Industrial</div>
  </div>

  <div class="produto-card" onclick="selecionarCategoria('acetileno')">
    <img src="https://via.placeholder.com/300x200?text=Acetileno">
    <div class="label">Acetileno</div>
  </div>

  <div class="produto-card" onclick="selecionarCategoria('argonio')">
    <img src="https://via.placeholder.com/300x200?text=Argonio">
    <div class="label">Argônio</div>
  </div>

  <div class="produto-card" onclick="selecionarCategoria('nitrogenio')">
    <img src="https://via.placeholder.com/300x200?text=Nitrogenio">
    <div class="label">Nitrogênio</div>
  </div>

  <div class="produto-card" onclick="selecionarCategoria('co2')">
    <img src="https://via.placeholder.com/300x200?text=CO2">
    <div class="label">CO2</div>
  </div>

</div>

<!-- CLIENTES -->
<input id="cliente" placeholder="Cliente">
<input id="produto" placeholder="Produto">
<input id="validade" type="date">
<button onclick="salvar()">Salvar</button>

<input id="buscar" placeholder="🔎 Buscar cliente..." onkeyup="filtrar()">

<div id="lista"></div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA7mX9Zjh6yCgTvwFnlLGD_XMm5KHj8lEY",
  authDomain: "oximar-28b3f.firebaseapp.com",
  databaseURL: "https://oximar-28b3f-default-rtdb.firebaseio.com",
  projectId: "oximar-28b3f",
  storageBucket: "oximar-28b3f.firebasestorage.app",
  messagingSenderId: "1348432348",
  appId: "1:1348432348:web:ffb391f71a71dde10adf19"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);
const banco = ref(db, "oximar");

signOut(auth);

window.entrar = function () {
  signInWithEmailAndPassword(auth, email.value, senha.value)
    .catch(e => alert(e.message));
};

onAuthStateChanged(auth, (user) => {
  if (user) {
    loginBox.style.display = "none";
    painel.style.display = "block";
    carregar();
  } else {
    loginBox.style.display = "block";
    painel.style.display = "none";
  }
});

window.salvar = function () {
  push(banco, {
    cliente: cliente.value,
    produto: produto.value,
    validade: validade.value
  });
};

/* CACHE */
let cache = {};

function carregar() {
  onValue(banco, (snap) => {
    cache = snap.val() || {};
    atualizarDashboard(cache);
    mostrarLista(cache);
  });
}

function mostrarLista(dados) {
  lista.innerHTML = "";

  const hoje = new Date();
  hoje.setHours(0,0,0,0);

  for (let id in dados) {
    const i = dados[id];

    const p = i.validade.split("-");
    const data = new Date(p[0], p[1]-1, p[2]);
    data.setHours(0,0,0,0);

    const diff = Math.floor((hoje - data) / (1000*60*60*24));
    const vencido = diff > 0;

    lista.innerHTML += `
      <div class="item ${vencido ? "vencido" : ""}">
        <strong>${i.cliente}</strong>
        <small>${i.produto} | ${i.validade}</small>
        ${vencido ? `<div class="atraso">⚠️ Vencido há ${diff} dia(s)</div>` : ""}
        <button onclick="excluir('${id}')">Excluir</button>
      </div>
    `;
  }
}

function atualizarDashboard(dados) {
  const hoje = new Date();
  hoje.setHours(0,0,0,0);

  let total=0, vencidos=0, hojeCount=0;

  for (let id in dados) {
    const i = dados[id];
    if (!i.validade) continue;

    total++;

    const d = new Date(i.validade + "T00:00:00");
    d.setHours(0,0,0,0);

    if (d < hoje) vencidos++;
    if (d.getTime() === hoje.getTime()) hojeCount++;
  }

  totalClientes.innerText = total;
  vencidos.innerText = vencidos;
  hoje.innerText = hojeCount;
}

window.excluir = (id) => {
  remove(ref(db, "oximar/" + id));
};

window.mostrarFiltro = function(tipo){
  const hoje = new Date().toISOString().split("T")[0];
  let f = {};

  for (let id in cache){
    const i = cache[id];
    if (tipo==="todos") f[id]=i;
    if (tipo==="vencidos" && i.validade < hoje) f[id]=i;
    if (tipo==="hoje" && i.validade === hoje) f[id]=i;
  }

  mostrarLista(f);
};

window.filtrar = function(){
  const f = buscar.value.toLowerCase();
  document.querySelectorAll(".item").forEach(i=>{
    i.style.display = i.innerText.toLowerCase().includes(f)?"":"none";
  });
};

window.selecionarCategoria = function(cat){
  alert("Categoria: " + cat);
};

</script>

</body>
</html>
