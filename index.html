<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Oximar Sistema</title>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  padding: 20px;
}

#loginBox {
  background: white;
  padding: 20px;
  border-radius: 10px;
  width: 300px;
  margin: auto;
  text-align: center;
}

#painel {
  display: none;
}

input, button {
  padding: 10px;
  margin: 5px;
  width: 90%;
}

table {
  width: 100%;
  background: white;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
  text-align: center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Login Oximar</h2>
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="entrar()">Entrar</button>
</div>

<!-- PAINEL -->
<div id="painel">

<h1>Controle Oximar 📊</h1>

<input id="cliente" placeholder="Cliente">
<input id="produto" placeholder="Produto">
<input id="validade" type="date">
<button onclick="salvar()">Salvar</button>

<table>
  <thead>
    <tr>
      <th>Cliente</th>
      <th>Produto</th>
      <th>Validade</th>
      <th>Ações</th>
    </tr>
  </thead>
  <tbody id="lista"></tbody>
</table>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getDatabase,
  ref,
  push,
  onValue,
  remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// 🔥 SEU FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyA7mX9Zjh6yCgTvwFnlLGD_XMm5KHj8lEY",
  authDomain: "oximar-28b3f.firebaseapp.com",
  databaseURL: "https://oximar-28b3f-default-rtdb.firebaseio.com",
  projectId: "oximar-28b3f",
  storageBucket: "oximar-28b3f.firebasestorage.app",
  messagingSenderId: "1348432348",
  appId: "1:1348432348:web:ffb391f71a71dde10adf19"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);
const banco = ref(db, "oximar");

// 🔐 LOGIN
window.entrar = function () {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  signInWithEmailAndPassword(auth, email, senha)
    .then(() => {
      alert("Login OK");
    })
    .catch((error) => {
      alert(error.message);
    });
};

// 👁️ MOSTRAR PAINEL
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("painel").style.display = "block";
    carregar();
  } else {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("painel").style.display = "none";
  }
});

// 💾 SALVAR
window.salvar = function () {
  const cliente = document.getElementById("cliente").value;
  const produto = document.getElementById("produto").value;
  const validade = document.getElementById("validade").value;

  push(banco, {
    cliente,
    produto,
    validade
  });

  alert("Salvo com sucesso!");
};

// 📊 CARREGAR
function carregar() {
  onValue(banco, (snapshot) => {
    const dados = snapshot.val();
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    for (let id in dados) {
      const item = dados[id];

      lista.innerHTML += `
        <tr>
          <td>${item.cliente}</td>
          <td>${item.produto}</td>
          <td>${item.validade}</td>
          <td><button onclick="excluir('${id}')">Excluir</button></td>
        </tr>
      `;
    }
  });
}

// 🗑️ EXCLUIR
window.excluir = function (id) {
  remove(ref(db, "oximar/" + id));
};

</script>

</body>
</html>
