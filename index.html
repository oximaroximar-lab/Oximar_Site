<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Oximar Controle</title>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  padding: 20px;
}

h1 { text-align: center; }

.form {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
}

input, button {
  padding: 10px;
  margin: 5px;
}

table {
  width: 100%;
  background: white;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #ddd;
}

.vencido { background: #ffcccc; }
.alerta { background: #fff3cd; }
</style>
</head>

<body>

<h1>Controle Oximar</h1>

<div class="form">
  <input id="cliente" placeholder="Cliente">
  <input id="produto" placeholder="Produto">
  <input id="validade" type="date">
  <button onclick="salvar()">Salvar</button>
</div>

<table>
  <thead>
    <tr>
      <th>Cliente</th>
      <th>Produto</th>
      <th>Validade</th>
      <th>Ações</th>
    </tr>
  </thead>
  <tbody id="lista"></tbody>
</table>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getDatabase,
  ref,
  push,
  onValue,
  remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// 🔥 SEU FIREBASE CONFIG (coloque o seu aqui)
const firebaseConfig = {
  apiKey: "AIzaSyA7mX9Zjh6yCgTvwFnlLGD_XMm5KHj8lEY",
  authDomain: "oximar-28b3f.firebaseapp.com",
  databaseURL: "https://oximar-28b3f-default-rtdb.firebaseio.com",
  projectId: "oximar-28b3f",
  storageBucket: "oximar-28b3f",
  messagingSenderId: "1348432348",
  appId: "1:1348432348:web:ffb391f71a71dde10adf19"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const banco = ref(db, "oximar");

// SALVAR
window.salvar = function () {
  const cliente = document.getElementById("cliente").value;
  const produto = document.getElementById("produto").value;
  const validade = document.getElementById("validade").value;

  push(banco, {
    cliente,
    produto,
    validade
  });

  alert("Salvo com sucesso!");
};

// CARREGAR
function carregar() {
  onValue(banco, (snapshot) => {
    const dados = snapshot.val();
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    const hoje = new Date().toISOString().split("T")[0];

    for (let id in dados) {
      const item = dados[id];

      let classe = "";
      if (item.validade < hoje) classe = "vencido";
      else if (item.validade === hoje) classe = "alerta";

      lista.innerHTML += `
        <tr class="${classe}">
          <td>${item.cliente}</td>
          <td>${item.produto}</td>
          <td>${item.validade}</td>
          <td><button onclick="excluir('${id}')">Excluir</button></td>
        </tr>
      `;
    }
  });
}

// EXCLUIR
window.excluir = function (id) {
  remove(ref(db, "oximar/" + id));
};

carregar();
</script>

</body>
</html>
