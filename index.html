<!DOCTYPE html>
<html>
<head>
  <title>Oximar</title>
</head>
<body>

  <h1>Cadastro</h1>

  <input type="text" id="nome" placeholder="Nome">
  <button onclick="salvar()">Salvar</button>

  <h3>Lista</h3>
  <ul id="lista"></ul>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA7mX9Zjh6yCgTvwFnlLGD_XMm5KHj8lEY",
      authDomain: "oximar-28b3f.firebaseapp.com",
      databaseURL: "https://oximar-28b3f-default-rtdb.firebaseio.com",
      projectId: "oximar-28b3f",
      storageBucket: "oximar-28b3f.firebasestorage.app",
      messagingSenderId: "1348432348",
      appId: "1:1348432348:web:ffb391f71a71dde10adf19"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // salvar
    window.salvar = function() {
      let nome = document.getElementById("nome").value;

      set(ref(db, 'clientes/' + nome), {
        nome: nome
      });
    }

    // mostrar
    const lista = document.getElementById("lista");

    onValue(ref(db, 'clientes'), (snapshot) => {
      lista.innerHTML = "";

      snapshot.forEach((child) => {
        let li = document.createElement("li");
        li.textContent = child.val().nome;
        lista.appendChild(li);
      });
    });
  </script>

</body>
</html>
