<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Oximar App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #eef2f7;
}

/* HEADER */
header {
  background: #2e7d32;
  color: white;
  padding: 15px;
  text-align: center;
}

/* TELAS */
.tela { display: none; padding: 15px; }
.ativa { display: block; }

/* MENU APP */
.menu {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: white;
  border-top: 1px solid #ccc;
}

.menu button {
  flex: 1;
  padding: 15px;
  border: none;
  background: none;
  font-size: 18px;
}

/* DASHBOARD */
.dashboard {
  display: flex;
  gap: 10px;
}

.card {
  flex: 1;
  background: white;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
  cursor: pointer;
}

.red { border-left: 5px solid red; }
.yellow { border-left: 5px solid orange; }

/* PRODUTOS */
.produtos {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.produto {
  background: #2f5f7c;
  border-radius: 20px;
  overflow: hidden;
}

.produto img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.titulo {
  background: #8bc34a;
  color: white;
  text-align: center;
  padding: 10px;
}

/* LISTA */
.item {
  background: white;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
}

.vencido {
  border-left: 6px solid red;
  background: #ffe5e5;
}

.atraso {
  color: red;
  font-size: 12px;
}

/* INPUT */
input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<header>📦 Oximar</header>

<!-- DASHBOARD -->
<div id="dashboard" class="tela ativa">
  <div class="dashboard">
    <div class="card" onclick="mostrarFiltro('todos')">
      <h3 id="totalClientes">0</h3>
      <p>Total</p>
    </div>
    <div class="card red" onclick="mostrarFiltro('vencidos')">
      <h3 id="vencidos">0</h3>
      <p>Vencidos</p>
    </div>
    <div class="card yellow" onclick="mostrarFiltro('hoje')">
      <h3 id="hoje">0</h3>
      <p>Hoje</p>
    </div>
  </div>
</div>

<!-- PRODUTOS -->
<div id="produtos" class="tela">
  <div class="produtos">

    <div class="produto" onclick="selecionar('Industrial')">
      <img src="https://i.imgur.com/8Km9tLL.jpg">
      <div class="titulo">Gases Industriais</div>
    </div>

    <div class="produto" onclick="selecionar('Medicinal')">
      <img src="https://i.imgur.com/2DhmtJ4.jpg">
      <div class="titulo">Gases Medicinais</div>
    </div>

    <div class="produto" onclick="selecionar('Especiais')">
      <img src="https://i.imgur.com/1n6hF7F.jpg">
      <div class="titulo">Gases Especiais</div>
    </div>

    <div class="produto" onclick="selecionar('Baloes')">
      <img src="https://i.imgur.com/Vz81Q0F.jpg">
      <div class="titulo">Gases para balões</div>
    </div>

  </div>
</div>

<!-- CADASTRO -->
<div id="cadastro" class="tela">
  <input id="cliente" placeholder="Cliente">
  <input id="produto" placeholder="Produto">
  <input id="validade" type="date">
  <button onclick="salvar()">Salvar</button>
</div>

<!-- CLIENTES -->
<div id="clientes" class="tela">
  <input id="buscar" placeholder="Buscar..." onkeyup="filtrar()">
  <div id="lista"></div>
</div>

<!-- MENU -->
<div class="menu">
  <button onclick="trocarTela('dashboard')">🏠</button>
  <button onclick="trocarTela('produtos')">📦</button>
  <button onclick="trocarTela('cadastro')">➕</button>
  <button onclick="trocarTela('clientes')">📋</button>
</div>

<script>
let dados = {};

/* NAV */
function trocarTela(id) {
  document.querySelectorAll(".tela").forEach(t => t.classList.remove("ativa"));
  document.getElementById(id).classList.add("ativa");
}

/* SELECIONAR PRODUTO */
function selecionar(tipo) {
  document.getElementById("produto").value = tipo;
  trocarTela("cadastro");
}

/* SALVAR */
function salvar() {
  const id = Date.now();
  dados[id] = {
    cliente: cliente.value,
    produto: produto.value,
    validade: validade.value
  };
  atualizar();
}

/* ATUALIZAR */
function atualizar() {
  const hoje = new Date();
  hoje.setHours(0,0,0,0);

  let total=0,venc=0,hj=0;
  lista.innerHTML="";

  for(let id in dados){
    const i = dados[id];
    total++;

    const d = new Date(i.validade+"T00:00:00");
    d.setHours(0,0,0,0);

    let diff = Math.floor((hoje-d)/(1000*60*60*24));
    let vencido = diff>0;

    if(vencido) venc++;
    if(diff===0) hj++;

    lista.innerHTML+=`
      <div class="item ${vencido?'vencido':''}">
        <strong>${i.cliente}</strong>
        <small>${i.produto} | ${i.validade}</small>
        ${vencido?`<div class="atraso">Vencido há ${diff} dias</div>`:''}
      </div>`;
  }

  totalClientes.innerText=total;
  vencidos.innerText=venc;
  hoje.innerText=hj;
}

/* FILTRO */
function mostrarFiltro(tipo){
  trocarTela("clientes");
}

/* BUSCA */
function filtrar(){
  let f=buscar.value.toLowerCase();
  document.querySelectorAll(".item").forEach(i=>{
    i.style.display=i.innerText.toLowerCase().includes(f)?"":"none";
  });
}
</script>

</body>
</html>
