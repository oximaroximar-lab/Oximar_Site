<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Oximar Sistema</title>

<style>
body { margin:0; font-family:Arial; background:#eef2f7; }

/* HEADER */
header {
  background:#2e7d32;
  color:white;
  padding:15px;
  text-align:center;
}

/* AVISO */
.aviso {
  background:#fff3cd;
  text-align:center;
  padding:10px;
}

/* LOGIN */
#loginBox {
  max-width:300px;
  margin:80px auto;
  background:white;
  padding:20px;
  border-radius:10px;
}

/* TELAS */
.tela { display:none; }
.ativa { display:block; }

/* MENU PRINCIPAL */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:15px;
}

.btn {
  background:#e0e0e0;
  padding:25px;
  text-align:center;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
}

/* TOPO */
.topo {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#2e7d32;
  color:white;
  padding:10px;
}

/* LISTA */
.item, .venda {
  background:white;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

.vencido {
  background:#ffe5e5;
  border-left:5px solid red;
}

.atraso { color:red; font-size:12px; }

/* PRODUTOS */
.produtos {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.produto {
  border-radius:10px;
  overflow:hidden;
}

.produto img {
  width:100%;
  height:120px;
  object-fit:cover;
}

.titulo {
  background:#8bc34a;
  color:white;
  text-align:center;
  padding:8px;
}

input, button {
  width:90%;
  margin:10px;
  padding:10px;
}
</style>
</head>

<body>

<header>OXIMAR</header>
<div class="aviso">⚠️ Configure o Firebase corretamente</div>

<!-- LOGIN -->
<div id="loginBox">
  <h3>Login</h3>
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="entrar()">Entrar</button>
</div>

<!-- MENU -->
<div id="menu" class="tela">
  <h2 style="text-align:center">OXIMAR GASES</h2>

  <div class="grid">
    <div class="btn" onclick="trocarTela('clientes')">👥 Clientes</div>
    <div class="btn" onclick="trocarTela('vendas')">🛒 Venda</div>
    <div class="btn" onclick="trocarTela('produtos')">📦 Produtos</div>
  </div>
</div>

<!-- VENDAS -->
<div id="vendas" class="tela">
  <div class="topo">
    <button onclick="trocarTela('menu')">⬅</button>
    <h3>Vendas</h3>
    <button onclick="trocarTela('novaVenda')">＋</button>
  </div>
  <div id="listaVendas"></div>
</div>

<!-- NOVA VENDA -->
<div id="novaVenda" class="tela">
  <div class="topo">
    <button onclick="trocarTela('vendas')">⬅</button>
    <h3>Nova Venda</h3>
  </div>
  <input id="clienteVenda" placeholder="Cliente">
  <input id="valorVenda" placeholder="Valor">
  <button onclick="salvarVenda()">Registrar Venda</button>
</div>

<!-- PRODUTOS -->
<div id="produtos" class="tela">
  <div class="produtos">
    <div class="produto" onclick="selecionar('Industrial')">
      <img src="https://i.imgur.com/8Km9tLL.jpg">
      <div class="titulo">Gases Industriais</div>
    </div>
    <div class="produto" onclick="selecionar('Medicinal')">
      <img src="https://i.imgur.com/2DhmtJ4.jpg">
      <div class="titulo">Gases Medicinais</div>
    </div>
  </div>
</div>

<!-- CLIENTES -->
<div id="clientes" class="tela">
  <div class="topo">
    <button onclick="trocarTela('menu')">⬅</button>
    <h3>Clientes</h3>
  </div>
  <input id="buscar" placeholder="Buscar..." onkeyup="filtrar()">
  <div id="lista"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* CONFIG */
const firebaseConfig = {
 apiKey: "AIzaSyA7mX9Zjh6yCgTvwFnlLGD_XMm5KHj8lEY",
  authDomain: "oximar-28b3f.firebaseapp.com",
  databaseURL: "https://oximar-28b3f-default-rtdb.firebaseio.com",
  projectId: "oximar-28b3f",
  storageBucket: "oximar-28b3f.firebasestorage.app",
  messagingSenderId: "1348432348",
  appId: "1:1348432348:web:ffb391f71a71dde10adf19"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const banco = ref(db, "clientes");
const auth = getAuth(app);

/* LOGIN */
window.entrar = function(){
  signInWithEmailAndPassword(auth, email.value, senha.value)
    .catch(e=>alert(e.message));
};

onAuthStateChanged(auth,(user)=>{
  if(user){
    loginBox.style.display="none";
    document.querySelector(".aviso").style.display="none";
    document.querySelectorAll(".tela").forEach(t=>t.style.display="block");
    trocarTela("menu");
    carregar();
  }else{
    loginBox.style.display="block";
  }
});

/* NAV */
window.trocarTela = function(id){
  document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativa"));
  document.getElementById(id).classList.add("ativa");
};

/* CLIENTES */
function carregar(){
  onValue(banco,(snap)=>{
    const dados=snap.val()||{};
    lista.innerHTML="";
    for(let id in dados){
      let i=dados[id];
      lista.innerHTML+=`
        <div class="item">
          <strong>${i.cliente}</strong><br>
          ${i.produto} - ${i.validade}
        </div>`;
    }
  });
}

/* BUSCA */
window.filtrar=function(){
  let f=buscar.value.toLowerCase();
  document.querySelectorAll(".item").forEach(i=>{
    i.style.display=i.innerText.toLowerCase().includes(f)?"":"none";
  });
};

/* VENDAS */
let vendas={};

window.salvarVenda=function(){
  const id=Date.now();
  vendas[id]={
    cliente:clienteVenda.value,
    valor:valorVenda.value,
    data:new Date().toLocaleDateString()
  };
  atualizarVendas();
  trocarTela("vendas");
};

function atualizarVendas(){
  listaVendas.innerHTML="";
  for(let id in vendas){
    let v=vendas[id];
    listaVendas.innerHTML+=`
      <div class="venda">
        <strong>${v.cliente}</strong><br>
        ${v.data}<br>
        R$ ${v.valor}
      </div>`;
  }
}

/* PRODUTO */
window.selecionar=function(tipo){
  alert("Selecionado: "+tipo);
};

</script>

</body>
</html>
