<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Oximar App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #eef2f7;
}

/* HEADER */
header {
  background: #2e7d32;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

/* LOGIN */
#loginBox {
  width: 90%;
  max-width: 350px;
  margin: 80px auto;
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  text-align: center;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  background: #2e7d32;
  color: white;
  border: none;
  font-weight: bold;
}

/* PAINEL */
#painel {
  display: none;
  padding: 15px;
}

/* FORM CARD */
.card {
  background: white;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  margin-bottom: 15px;
}

/* BUSCA */
#buscar {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

/* LISTA ESTILO APP */
.item {
  background: white;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.item strong {
  display: block;
  font-size: 16px;
}

.item small {
  color: gray;
}

.item button {
  background: red;
  margin-top: 8px;
  padding: 8px;
  border-radius: 8px;
}
</style>
</head>

<body>

<header>📦 Oximar Sistema</header>

<!-- LOGIN -->
<div id="loginBox">
  <h3>Login Funcionário</h3>
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="entrar()">Entrar</button>
</div>

<!-- PAINEL -->
<div id="painel">

<div class="card">
  <input id="cliente" placeholder="Cliente">
  <input id="produto" placeholder="Produto">
  <input id="validade" type="date">
  <button onclick="salvar()">Salvar</button>
</div>

<div class="card">
  <input id="buscar" placeholder="🔎 Buscar cliente..." onkeyup="filtrar()">
</div>

<div id="lista"></div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getDatabase,
  ref,
  push,
  onValue,
  remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyA7mX9Zjh6yCgTvwFnlLGD_XMm5KHj8lEY",
  authDomain: "oximar-28b3f.firebaseapp.com",
  databaseURL: "https://oximar-28b3f-default-rtdb.firebaseio.com",
  projectId: "oximar-28b3f",
  storageBucket: "oximar-28b3f.firebasestorage.app",
  messagingSenderId: "1348432348",
  appId: "1:1348432348:web:ffb391f71a71dde10adf19"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);
const banco = ref(db, "oximar");

signOut(auth);

/* LOGIN */
window.entrar = function () {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  signInWithEmailAndPassword(auth, email, senha)
    .catch(e => alert(e.message));
};

/* PAINEL */
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("painel").style.display = "block";
    carregar();
  } else {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("painel").style.display = "none";
  }
});

/* SALVAR */
window.salvar = function () {
  push(banco, {
    cliente: cliente.value,
    produto: produto.value,
    validade: validade.value
  });

  alert("Salvo!");
};

/* CARREGAR */
function carregar() {
  onValue(banco, (snap) => {
    const dados = snap.val();
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    for (let id in dados) {
      const i = dados[id];

      lista.innerHTML += `
        <div class="item">
          <strong>${i.cliente}</strong>
          <small>${i.produto} | ${i.validade}</small>
          <button onclick="excluir('${id}')">Excluir</button>
        </div>
      `;
    }
  });
}

/* EXCLUIR */
window.excluir = (id) => {
  remove(ref(db, "oximar/" + id));
};

/* BUSCA */
window.filtrar = function () {
  const f = buscar.value.toLowerCase();
  const itens = document.querySelectorAll(".item");

  itens.forEach(i => {
    i.style.display = i.innerText.toLowerCase().includes(f) ? "" : "none";
  });
};

</script>

</body>
</html>
